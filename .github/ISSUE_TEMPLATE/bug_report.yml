name: Bug report
description: Something in this repo isn't behaving the way it should.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. Please search existing issues before submitting.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Exact steps that reproduce the issue, starting from a clean state.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the relevant error output. Trim long stack traces to the meaningful frames.
      render: text
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: The version of the affected component (release tag, package version, or commit SHA).
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime versions, and anything else relevant.
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Workarounds you tried, related issues, links to a failing CI run, etc.
