name: Feature request
description: Suggest an enhancement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please search existing issues before submitting — feature requests are often already tracked.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is the user-facing problem you're hitting? Describe the situation, not the proposed fix.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to behave? Include CLI shapes, config fields, or output examples where useful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why they fall short.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links to upstream issues, related PRs, prior art in other tools, etc.
